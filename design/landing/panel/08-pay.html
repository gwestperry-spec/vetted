<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Vetted — 08-pay</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 800px; height: 1733px;
    background: #EFE9DC;
    color: #1B221E;
    font-family: 'Libre Baskerville', Georgia, serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  .panel {
    position: relative;
    width: 800px; height: 1733px;
    background: #EFE9DC;
  }
  /* Headline owns the top ~22% of the panel. Tight to top edge, no large gap
     between it and the phone artifact below. */
  .headline {
    position: absolute;
    top: 120px; left: 60px; right: 60px;
    font-family: 'Libre Baskerville', serif;
    font-weight: 700;
    font-size: 64px;
    line-height: 1.05;
    letter-spacing: -0.008em;
    color: #1B221E;
    margin: 0;
  }
  .headline em {
    font-style: italic;
    font-weight: 400;
  }
  /* Phone artifact owns the bottom ~70% of the panel. iPhone 1284:2778 aspect
     preserved. Bottom hangs ~60px above the panel edge for breathing room. */
  .screen-wrap {
    position: absolute;
    left: 50%;
    top: 420px;          /* sits ~80px below the headline */
    transform: translateX(-50%);
    width: 580px;
    height: 1255px;      /* 580 × (2778/1284) ≈ 1255, iPhone aspect */
    border-radius: 48px;
    overflow: hidden;
    box-shadow: 0 60px 120px rgba(20,30,22,.20), 0 24px 48px rgba(20,30,22,.12), 0 0 0 1px rgba(20,30,22,0.06);
    background: #000;
  }
  .screen-wrap img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
  }
</style>
</head>
<body>
  <div class="panel">
    <h1 class="headline">Compensation,<br/>told <em>straight</em>.</h1>
    <div class="screen-wrap">
      <img src="./08-pay.png" alt="">
    </div>
  </div>
</body>
</html>
