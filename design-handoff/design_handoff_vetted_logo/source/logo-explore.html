<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Vetted — Score gauge V (B)</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../../../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { height: 100%; margin: 0; }
  body { background: #E8EAE5; font-family: var(--font-prose); }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="logo-marks.jsx"></script>

  <script type="text/babel">
    // ── The chosen mark — Candidate B, wider V (LinkedIn-letter ratio).
    // Glow + vignette + dim groove + vSpan 0.66.
    const B = (extra = {}) =>
      <ScoreV
        vSpan={0.50}
        strokeRel={0.17}
        dotSizeRel={0.17}
        dotGlow={true}
        dotGlowSize={2.0}
        vignette={0.30}
        grooveOpacity={0.10}
        grooveStyle="outlined"
        {...extra}
      />;

    function App() {
      return (
        <DesignCanvas
          title="Vetted — Score gauge V"
          subtitle="Wider V, glow on the live tip, soft vignette, dim groove."
        >
          <DCSection
            id="01"
            title="01 · The mark, at scale"
            subtitle="Display, app icon, notification, favicon. The 40px row is the legibility floor."
          >
            <DCArtboard id="display" label="Display — 320px" width={520} height={520}>
              <Stage>{B({ size: 320 })}</Stage>
            </DCArtboard>
            <DCArtboard id="appicon" label="App icon — 180px" width={420} height={420}>
              <Stage>{B({ size: 180 })}</Stage>
            </DCArtboard>
            <DCArtboard id="row" label="Range — 140 / 88 / 40 / 16" width={760} height={320}>
              <Stage>
                <div style={{ display: 'flex', alignItems: 'flex-end', gap: 36 }}>
                  {B({ size: 140 })}
                  {B({ size: 88 })}
                  {B({ size: 40, strokeRel: 0.19, dotSizeRel: 0.22 })}
                  {B({ size: 16, strokeRel: 0.22, dotSizeRel: 0.30, cornerRel: 0.18 })}
                </div>
              </Stage>
            </DCArtboard>
          </DCSection>

          <DCSection
            id="02"
            title="02 · On a homescreen"
            subtitle="Sitting next to real iOS app icons."
          >
            <DCArtboard id="homescreen" label="Homescreen row" width={760} height={320}>
              <Stage flush><HomescreenContextB/></Stage>
            </DCArtboard>
          </DCSection>

          <DCSection
            id="03"
            title="03 · V width comparison"
            subtitle="Stroke weight held constant. Only the V's horizontal span changes — narrow at left, wide at right (the previous version)."
          >
            <DCArtboard id="width-row" label="vSpan: 0.42 · 0.50 · 0.58 · 0.66" width={920} height={360}>
              <Stage>
                <div style={{ display: 'flex', alignItems: 'flex-end', gap: 28 }}>
                  {[0.42, 0.50, 0.58, 0.66].map(s => (
                    <div key={s} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 14 }}>
                      {B({ size: 180, vSpan: s })}
                      <div style={{
                        fontFamily: '"Inter", sans-serif', fontSize: 11,
                        color: '#6c6960', letterSpacing: 1.2,
                      }}>vSpan {s.toFixed(2)}</div>
                    </div>
                  ))}
                </div>
              </Stage>
            </DCArtboard>

            <DCArtboard id="width-narrow" label="Narrow — vSpan 0.42, app icon" width={420} height={420}>
              <Stage>{B({ size: 180, vSpan: 0.42 })}</Stage>
            </DCArtboard>
            <DCArtboard id="width-mid-narrow" label="Mid-narrow — vSpan 0.50, app icon" width={420} height={420}>
              <Stage>{B({ size: 180, vSpan: 0.50 })}</Stage>
            </DCArtboard>
            <DCArtboard id="width-mid" label="Mid — vSpan 0.58, app icon" width={420} height={420}>
              <Stage>{B({ size: 180, vSpan: 0.58 })}</Stage>
            </DCArtboard>
            <DCArtboard id="width-wide" label="Wide — vSpan 0.66, app icon" width={420} height={420}>
              <Stage>{B({ size: 180, vSpan: 0.66 })}</Stage>
            </DCArtboard>
          </DCSection>

          <DCSection
            id="04"
            title="04 · Groove treatment"
            subtitle="Three takes on the gauge track. Plain (current), depth-light (subtle inset feel), outlined (clearly visible track edges)."
          >
            <DCArtboard id="groove-row" label="plain · depth-light · outlined" width={920} height={400}>
              <Stage>
                <div style={{ display: 'flex', alignItems: 'flex-end', gap: 36 }}>
                  {[
                    { mode: 'plain',        label: 'Plain (current)' },
                    { mode: 'depth-light',  label: 'Depth, lighter' },
                    { mode: 'outlined',     label: 'Outlined' },
                  ].map(it => (
                    <div key={it.mode} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 14 }}>
                      {B({ size: 220, grooveStyle: it.mode })}
                      <div style={{
                        fontFamily: '"Inter", sans-serif', fontSize: 11,
                        color: '#6c6960', letterSpacing: 1.2, textTransform: 'uppercase',
                      }}>{it.label}</div>
                    </div>
                  ))}
                </div>
              </Stage>
            </DCArtboard>

            <DCArtboard id="groove-depth" label="Depth, lighter — app icon" width={420} height={420}>
              <Stage>{B({ size: 180, grooveStyle: 'depth-light' })}</Stage>
            </DCArtboard>
            <DCArtboard id="groove-outlined" label="Outlined — app icon" width={420} height={420}>
              <Stage>{B({ size: 180, grooveStyle: 'outlined' })}</Stage>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    // Homescreen row, but using candidate B for the Vetted slot.
    function HomescreenContextB() {
      const row = [
        { color: '#34c759', label: 'Health' },
        { color: '#0a84ff', label: 'Maps' },
        { type: 'vetted', label: 'Vetted' },
        { color: '#ff9500', label: 'Notes' },
      ];
      return (
        <div style={{
          width: '100%', padding: 28,
          background: 'linear-gradient(180deg, #aaa9a3 0%, #6c6960 100%)',
          display: 'flex', flexDirection: 'column', alignItems: 'center',
          gap: 18,
        }}>
          <div style={{ display: 'flex', gap: 22, alignItems: 'flex-end' }}>
            {row.map((it, i) => (
              <div key={i} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8 }}>
                {it.type === 'vetted' ? (
                  <ScoreV size={70} vSpan={0.50} strokeRel={0.17} dotSizeRel={0.17}
                          dotGlow vignette={0.30} grooveOpacity={0.10} grooveStyle="outlined"/>
                ) : (
                  <div style={{
                    width: 70, height: 70, borderRadius: 16,
                    background: it.color,
                    boxShadow: '0 6px 16px rgba(0,0,0,0.18)',
                  }}/>
                )}
                <div style={{
                  fontFamily: '"Inter", sans-serif', fontSize: 11,
                  color: 'rgba(255,255,255,0.92)', letterSpacing: 0.2,
                  textShadow: '0 1px 2px rgba(0,0,0,0.4)',
                }}>{it.label}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function Stage({ children, flush }) {
      return (
        <div style={{
          width: '100%', height: '100%',
          background: '#F4F4F1',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          padding: flush ? 0 : 24,
          boxSizing: 'border-box',
        }}>
          {children}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
