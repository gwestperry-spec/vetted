[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    # ── Clickjacking protection ───────────────────────────────────────────
    X-Frame-Options = "DENY"

    # ── Prevent MIME sniffing ─────────────────────────────────────────────
    X-Content-Type-Options = "nosniff"

    # ── Referrer policy ───────────────────────────────────────────────────
    Referrer-Policy = "strict-origin-when-cross-origin"

    # ── Force HTTPS ───────────────────────────────────────────────────────
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # ── Permissions policy — disable unused browser features ─────────────
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

    # ── Content Security Policy ───────────────────────────────────────────
    # script-src: only our own scripts + Google Fonts inline
    # connect-src: Anthropic API proxy (our Netlify function) + Apple auth + allorigins proxy
    # style-src: our styles + Google Fonts
    # font-src: Google Fonts CDN
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      connect-src 'self'
        https://celebrated-gelato-56d525.netlify.app
        https://appleid.apple.com
        https://api.allorigins.win;
      img-src 'self' data: https://images.unsplash.com;
      frame-src 'none';
      object-src 'none';
      base-uri 'self';
      form-action 'self';
    """

# ── Function-specific headers ─────────────────────────────────────────────
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://celebrated-gelato-56d525.netlify.app"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, X-Vetted-Token"

[functions]
  included_files = ["netlify/functions/**"]

[functions."anthropic"]
  timeout = 30

# Streaming function — longer timeout to cover full Claude response stream.
# X-Accel-Buffering: no is set in the function handler to disable nginx buffering.
[functions."anthropic-stream"]
  timeout = 30

[functions."stripe-webhook"]
  timeout = 26

[functions."behavioral-intelligence"]
  timeout = 30

# ── Staging context ───────────────────────────────────────────────────────────
# Deploy the `staging` branch to a separate Netlify environment with its own
# env vars (set in Netlify dashboard → Site configuration → Environment variables
# → staging context): VT_DB_URL, VT_DB_KEY, ANTHROPIC_KEY, VETTED_SECRET.
# Promotion to production is a manual step via Netlify dashboard or CLI.
#
# To activate:
#   1. Create a Supabase staging project and copy the production schema to it.
#   2. Push a `staging` branch to the remote.
#   3. In Netlify dashboard: Deploys → Branch deploys → add `staging`.
#   4. Set env vars for the staging context pointing to the staging Supabase project.
[context.staging]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[context.staging.environment]
  # NETLIFY_CONTEXT is automatically set to "staging" by Netlify.
  # App-level env vars (VT_DB_URL, VT_DB_KEY, etc.) must be set per-context
  # in the Netlify dashboard — they cannot be committed to this file.
  NODE_ENV = "production"

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

# ── favicon.ico → favicon.svg ──────────────────────────────────────────────────
# Browsers auto-request /favicon.ico; we only ship favicon.svg.
# Redirect instead of 404.
[[redirects]]
  from = "/favicon.ico"
  to = "/favicon.svg"
  status = 301

# ── /api/seats — stub 200 to silence browser extension probes ─────────────────
# Deal-finder extensions (Honey, Capital One Shopping, etc.) call
# /api/seats?tier=... on any subscription-priced site. Nothing in the app
# calls this endpoint — returning 200 prevents spurious 404 console noise.
[[redirects]]
  from = "/api/seats"
  to = "/.netlify/functions/seats"
  status = 200
  force = true

# ── PostHog reverse proxy ─────────────────────────────────────────────────────
# Routes PostHog capture requests through our own domain so they:
#   1. Pass the Content-Security-Policy connect-src 'self' rule
#   2. Avoid CORS issues with internal-j.posthog.com
#   3. Survive most ad blockers (requests appear same-origin)
[[redirects]]
  from = "/ph/static/*"
  to = "https://us-assets.i.posthog.com/static/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/ph/*"
  to = "https://us.i.posthog.com/:splat"
  status = 200
  force = true
