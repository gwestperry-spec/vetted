[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    # ── Clickjacking protection ───────────────────────────────────────────
    X-Frame-Options = "DENY"

    # ── Prevent MIME sniffing ─────────────────────────────────────────────
    X-Content-Type-Options = "nosniff"

    # ── Referrer policy ───────────────────────────────────────────────────
    Referrer-Policy = "strict-origin-when-cross-origin"

    # ── Force HTTPS ───────────────────────────────────────────────────────
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # ── Permissions policy — disable unused browser features ─────────────
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

    # ── Content Security Policy ───────────────────────────────────────────
    # script-src: only our own scripts + Google Fonts inline
    # connect-src: Anthropic API proxy (our Netlify function) + Apple auth + allorigins proxy
    # style-src: our styles + Google Fonts
    # font-src: Google Fonts CDN
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      connect-src 'self'
        https://celebrated-gelato-56d525.netlify.app
        https://appleid.apple.com;
      img-src 'self' data: https://images.unsplash.com;
      frame-src 'self';
      object-src 'none';
      base-uri 'self';
      form-action 'self';
    """

# ── Reel iframes — scoped CSP loosening ───────────────────────────────────────
# The reel pages under /reel/*.html are React+Babel JSX animations that load
# react / react-dom / @babel/standalone from unpkg.com. Babel standalone
# requires 'unsafe-eval' to compile JSX in the browser. This loosening is
# scoped to /reel/* only — the homepage CSP at / stays strict.
[[headers]]
  for = "/reel/*"
  [headers.values]
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data:;
      connect-src 'self';
      frame-src 'self';
      object-src 'none';
      base-uri 'self';
    """

# ── Cache-Control: HTML always revalidated, hashed assets cached forever ──────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Vite-built SPA bundle (hashed filenames) — cache forever
[[headers]]
  for = "/_assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Apple App Site Association — Universal Links handshake file.
# Apple requires Content-Type: application/json (not application/pkcs7-mime
# in modern iOS). The file has no extension so Netlify wouldn't infer this
# without an explicit header rule. Cache short so we can iterate on AASA
# changes if needed; Apple's CDN caches it independently.
[[headers]]
  for = "/.well-known/apple-app-site-association"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=3600, must-revalidate"

# Landing page assets (logo, tokens.css) — short cache, not content-hashed
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/blog/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Function-specific headers ─────────────────────────────────────────────
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://celebrated-gelato-56d525.netlify.app"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, X-Vetted-Token"

[functions]
  included_files = ["netlify/functions/**"]

[functions."anthropic"]
  timeout = 30

# Streaming function — longer timeout to cover full Claude response stream.
# X-Accel-Buffering: no is set in the function handler to disable nginx buffering.
[functions."anthropic-stream"]
  timeout = 30

[functions."stripe-webhook"]
  timeout = 26

[functions."behavioral-intelligence"]
  timeout = 30

[functions."fetch-jd"]
  timeout = 20

# notify-reminders schedule removed in the notification cleanup.
# Reminder UI was dropped from the workspace in Build 30 and never
# replaced; the function had no rows to read. File retained in source
# for git history but no longer fires on cron.

# Pipeline notifications — daily at 14:00 UTC (10am ET / 7am PT)
# Sends: staleness nudge (7+ days no score) + timeline milestones
# (application follow-up stage removed alongside the reminder UI cleanup)
[functions."notify-pipeline"]
  schedule = "0 14 * * *"
  timeout  = 60

# Weekly digest — every Sunday at 15:00 UTC (11am ET / 8am PT)
[functions."notify-weekly"]
  schedule = "0 15 * * 0"
  timeout  = 60

# Workspace sweep — hourly cleanup of stuck "Scoring…" rows
# Deletes workspace_roles rows in (queued, scoring, in_progress, pending)
# older than 5 minutes with vq_score IS NULL.
# Manually invokable via POST with X-Vetted-Sweep-Secret = VETTED_SECRET.
[functions."workspace-sweep"]
  schedule = "0 * * * *"
  timeout  = 30

# ── Staging context ───────────────────────────────────────────────────────────
# Deploy the `staging` branch to a separate Netlify environment with its own
# env vars (set in Netlify dashboard → Site configuration → Environment variables
# → staging context): VT_DB_URL, VT_DB_KEY, ANTHROPIC_KEY, VETTED_SECRET.
# Promotion to production is a manual step via Netlify dashboard or CLI.
#
# To activate:
#   1. Create a Supabase staging project and copy the production schema to it.
#   2. Push a `staging` branch to the remote.
#   3. In Netlify dashboard: Deploys → Branch deploys → add `staging`.
#   4. Set env vars for the staging context pointing to the staging Supabase project.
[context.staging]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[context.staging.environment]
  # NETLIFY_CONTEXT is automatically set to "staging" by Netlify.
  # App-level env vars (VT_DB_URL, VT_DB_KEY, etc.) must be set per-context
  # in the Netlify dashboard — they cannot be committed to this file.
  NODE_ENV = "production"

# ── Web ↔ iOS routing split ──────────────────────────────────────────────────
# dist/index.html IS the React SPA — must stay there so Capacitor's iOS
# bundle (webDir = "dist") loads the app on launch.
# The marketing landing sits at dist/landing.html and is exposed to web
# traffic via a force rewrite at /. force=true is required because Netlify
# would otherwise serve dist/index.html (the SPA) for / by default.
[[redirects]]
  from = "/"
  to = "/landing.html"
  status = 200
  force = true

# Web users navigating to /app should land on the SPA. URL stays /app;
# content is dist/index.html. Same for any client-side route under /app.
[[redirects]]
  from = "/app"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/app/*"
  to = "/index.html"
  status = 200

# Universal Links handshake — /score?url=… is the Share Extension's
# Universal Link target. On iOS devices WITH Vetted installed, iOS
# intercepts this URL via the apple-app-site-association handshake
# and opens the app instead of loading the page. On devices WITHOUT
# Vetted installed, this redirect sends the visitor to the marketing
# landing page so they can install the app.
[[redirects]]
  from = "/score"
  to = "/landing.html"
  status = 302
  force = true

# Legacy /signin entry point → /app
[[redirects]]
  from = "/signin"
  to = "/app"
  status = 302

# Internal KPI dashboard — no in-app nav, password-gated by the
# dashboard-data Netlify function. /dashboard → /dashboard/index.html.
[[redirects]]
  from = "/dashboard"
  to = "/dashboard/index.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

# ── favicon.ico → favicon.svg ──────────────────────────────────────────────────
# Browsers auto-request /favicon.ico; we only ship favicon.svg.
# Redirect instead of 404.
[[redirects]]
  from = "/favicon.ico"
  to = "/favicon.svg"
  status = 301

# ── /api/seats — stub 200 to silence browser extension probes ─────────────────
# Deal-finder extensions (Honey, Capital One Shopping, etc.) call
# /api/seats?tier=... on any subscription-priced site. Nothing in the app
# calls this endpoint — returning 200 prevents spurious 404 console noise.
[[redirects]]
  from = "/api/seats"
  to = "/.netlify/functions/seats"
  status = 200
  force = true

# ── PostHog reverse proxy ─────────────────────────────────────────────────────
# Routes PostHog capture requests through our own domain so they:
#   1. Pass the Content-Security-Policy connect-src 'self' rule
#   2. Avoid CORS issues with internal-j.posthog.com
#   3. Survive most ad blockers (requests appear same-origin)
[[redirects]]
  from = "/ph/static/*"
  to = "https://us-assets.i.posthog.com/static/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/ph/*"
  to = "https://us.i.posthog.com/:splat"
  status = 200
  force = true

# (The /app and /app/* rewrites are defined at the top of the redirects
# section, near the / rewrite, so the SPA routing is all in one place.)
