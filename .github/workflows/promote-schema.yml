name: Promote Schema to Staging

on:
  workflow_dispatch:
    inputs:
      app_schemas:
        description: "Comma-separated schemas to promote"
        required: true
        default: "public"
      rls_file:
        description: "RLS SQL file path"
        required: true
        default: "supabase/rls-policies.sql"

jobs:
  promote:
    runs-on: ubuntu-latest
    # Use a protected GitHub Environment named "staging"
    # Configure required reviewers in:
    # Settings -> Environments -> staging
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL 17 client tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -qO - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ secrets.PROD_DB_URL }}"
          test -n "${{ secrets.STAGING_DB_URL }}"

      - name: Promote schema + RLS
        shell: bash
        env:
          PROD_DB_URL: ${{ secrets.PROD_DB_URL }}
          STAGING_DB_URL: ${{ secrets.STAGING_DB_URL }}
          APP_SCHEMAS: ${{ github.event.inputs.app_schemas }}
          RLS_FILE: ${{ github.event.inputs.rls_file }}
        run: |
          set -Eeuo pipefail

          TS="$(date +%Y%m%d_%H%M%S)"
          WORKDIR=".db_promotion/${TS}"
          mkdir -p "${WORKDIR}"

          SCHEMA_DUMP="${WORKDIR}/schema.sql"
          STAGING_PRE_BACKUP="${WORKDIR}/staging_pre_schema.sql"
          LOG_FILE="${WORKDIR}/promotion.log"

          echo "Starting promotion @ ${TS}" | tee -a "${LOG_FILE}"
          echo "Schemas: ${APP_SCHEMAS}" | tee -a "${LOG_FILE}"

          SCHEMA_ARGS=()
          IFS=',' read -ra SCHEMA_LIST <<< "${APP_SCHEMAS}"
          for s in "${SCHEMA_LIST[@]}"; do
            s_trimmed="$(echo "$s" | xargs)"
            [[ -n "${s_trimmed}" ]] && SCHEMA_ARGS+=(-n "${s_trimmed}")
          done

          if [[ ${#SCHEMA_ARGS[@]} -eq 0 ]]; then
            echo "No valid schemas provided in APP_SCHEMAS" | tee -a "${LOG_FILE}"
            exit 1
          fi

          echo "1) Backup current staging schema (rollback asset)" | tee -a "${LOG_FILE}"
          pg_dump "${STAGING_DB_URL}" \
            --schema-only \
            "${SCHEMA_ARGS[@]}" \
            -f "${STAGING_PRE_BACKUP}" 2>&1 | tee -a "${LOG_FILE}"

          echo "2) Dump production schema-only" | tee -a "${LOG_FILE}"
          pg_dump "${PROD_DB_URL}" \
            --schema-only \
            "${SCHEMA_ARGS[@]}" \
            -f "${SCHEMA_DUMP}" 2>&1 | tee -a "${LOG_FILE}"

          echo "3) Apply schema dump to staging" | tee -a "${LOG_FILE}"
          psql "${STAGING_DB_URL}" -v ON_ERROR_STOP=1 -f "${SCHEMA_DUMP}" | tee -a "${LOG_FILE}"

          if [[ -f "${RLS_FILE}" ]]; then
            echo "4) Apply RLS file: ${RLS_FILE}" | tee -a "${LOG_FILE}"
            psql "${STAGING_DB_URL}" -v ON_ERROR_STOP=1 -f "${RLS_FILE}" | tee -a "${LOG_FILE}"
          else
            echo "4) Skip RLS (not found: ${RLS_FILE})" | tee -a "${LOG_FILE}"
          fi

          echo "5) Validate" | tee -a "${LOG_FILE}"
          psql "${STAGING_DB_URL}" -v ON_ERROR_STOP=1 -c "\dt public.*" | tee -a "${LOG_FILE}"
          psql "${STAGING_DB_URL}" -v ON_ERROR_STOP=1 -c "\dRp+" | tee -a "${LOG_FILE}"

      - name: Upload promotion artifacts
        uses: actions/upload-artifact@v4
        with:
          name: db-promotion-artifacts
          path: .db_promotion/
