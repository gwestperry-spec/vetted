<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="vig" cx="50%" cy="50%" r="70%">
      <stop offset="55%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.30"/>
    </radialGradient>
  </defs>
  <!-- Ground -->
  <rect width="100" height="100" fill="#2d6a4f" rx="22.5"/>
  <!-- Vignette -->
  <rect width="100" height="100" fill="url(#vig)" rx="22.5"/>
  <!-- Groove outline -->
  <path d="M 25 32 L 50 78 L 75 32"
    stroke="#000" stroke-opacity="0.45" stroke-width="21"
    stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Groove dim -->
  <path d="M 25 32 L 50 78 L 75 32"
    stroke="#fff" stroke-opacity="0.10" stroke-width="19"
    stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Fill 72% — tip lands on right arm -->
  <path d="M 25 32 L 50 78 L 61 57.8"
    stroke="#fff" stroke-opacity="0.93" stroke-width="19"
    stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Gold halo -->
  <circle cx="61" cy="57.8" r="11" fill="#fbbf24" opacity="0.35"/>
  <!-- Gold dot -->
  <circle cx="61" cy="57.8" r="5.5" fill="#fbbf24"/>
</svg>
