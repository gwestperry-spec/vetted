    <script>
      // Prevent pinch-zoom and double-tap zoom at the JS layer.
      // Needed because iOS 10+ ignores user-scalable=no in Safari;
      // Capacitor's WKWebView does respect it but this is a belt-and-suspenders guard.
      document.addEventListener('touchmove', function(e) {
        if (e.touches.length > 1) e.preventDefault();
      }, { passive: false });
      var lastTap = 0;
      document.addEventListener('touchend', function(e) {
        var now = Date.now();
        if (now - lastTap < 300) e.preventDefault();
        lastTap = now;
      }, { passive: false });
    </script>
