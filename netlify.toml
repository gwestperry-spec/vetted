[build]
  publish = "website"
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    # ── Clickjacking protection ───────────────────────────────────────────
    X-Frame-Options = "DENY"

    # ── Prevent MIME sniffing ─────────────────────────────────────────────
    X-Content-Type-Options = "nosniff"

    # ── Referrer policy ───────────────────────────────────────────────────
    Referrer-Policy = "strict-origin-when-cross-origin"

    # ── Force HTTPS ───────────────────────────────────────────────────────
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # ── Permissions policy — disable unused browser features ─────────────
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

    # ── Content Security Policy ───────────────────────────────────────────
    # script-src: only our own scripts + Google Fonts inline
    # connect-src: Anthropic API proxy (our Netlify function) + Apple auth + allorigins proxy
    # style-src: our styles + Google Fonts
    # font-src: Google Fonts CDN
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      connect-src 'self'
        https://celebrated-gelato-56d525.netlify.app
        https://appleid.apple.com
        https://api.allorigins.win;
      img-src 'self' data: https://images.unsplash.com;
      frame-src 'none';
      object-src 'none';
      base-uri 'self';
      form-action 'self';
    """

# ── Function-specific headers ─────────────────────────────────────────────
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://celebrated-gelato-56d525.netlify.app"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, X-Vetted-Token"

[functions]
  included_files = ["netlify/functions/**"]

[functions."anthropic"]
  timeout = 30

[functions."stripe-webhook"]
  timeout = 26
